# sqlc.yaml
# =============================================================================
# sqlc configuration file for the expenses module.
#
# sqlc reads this file to know:
#   - which database engine we're targeting (postgresql)
#   - where our schema DDL lives (db/schema/schema.sql)
#   - where our queries live (db/queries/query.sql)
#   - what Go package to generate into, and where to put it
#
# Run `sqlc generate` from the project root after any change to schema or queries.
# Run `sqlc vet` to catch common query mistakes before generating.
# =============================================================================

version: "2"

sql:
  - engine: "postgresql"

    # Path to the DDL schema file — the CREATE TABLE statements.
    # sqlc parses this to know column names and types so it can generate
    # correctly typed Go structs and function parameters.
    schema: "db/schema/schema.sql"

    # Path to the query file — the annotated SQL queries.
    # Pinned to query.sql (not the whole db/queries directory) so the auth
    # queries that live alongside it in db/queries/auth.sql are NOT pulled into
    # this expenses package — they are generated by the auth block below.
    queries: "db/queries/query.sql"

    gen:
      go:
        # The Go package name used in the generated files.
        # Import path will be: github.com/yourorg/yourapp/db/expenses
        package: "expenses"

        # Directory where generated .go files will be written.
        # sqlc creates this directory if it doesn't exist.
        out: "db/expenses"

        # Use pgx/v5 instead of database/sql.
        # pgx is the modern PostgreSQL driver for Go — it's faster, handles
        # more PostgreSQL-native types (UUID, JSONB, arrays), and has better
        # context/cancellation support. Always prefer this over lib/pq.
        sql_package: "pgx/v5"

        # Emit the Querier interface.
        # sqlc generates both a concrete *Queries struct and an interface.
        # The interface is very useful for testing — your handler tests can
        # use a mock that implements Querier instead of hitting a real database.
        emit_interface: true

        # Emit JSON tags on generated structs.
        # Adds `json:"field_name"` to every struct field so you can serialise
        # the generated structs directly in your HTTP handlers.
        emit_json_tags: true

        # Use pgtype for nullable columns instead of sql.NullString etc.
        # pgtype.Text, pgtype.UUID, pgtype.Int4 etc. are more ergonomic and
        # work natively with pgx without conversion.
        emit_pointers_for_null_types: false

        # Override how specific PostgreSQL types map to Go types.
        # Without overrides, sqlc uses pgtype.* for most things. These
        # overrides give us cleaner Go types where appropriate.
        overrides:
          # Map PostgreSQL UUID to google/uuid.UUID — the standard Go UUID type.
          # Much cleaner than pgtype.UUID in your business logic.
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          # Map JSONB columns to json.RawMessage ([]byte under the hood).
          # Your service layer then unmarshals this into a concrete struct.
          # Alternatively you could map to map[string]interface{} but
          # json.RawMessage defers parsing to the point where you know the shape.
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"

          # Map NUMERIC/DECIMAL to string to preserve exact precision.
          # Never use float64 for financial values — floating-point arithmetic
          # is not exact. Store as string and parse with a decimal library
          # (e.g. shopspring/decimal) in your service layer.
          - db_type: "pg_catalog.numeric"
            go_type: "string"

  # ===========================================================================
  # AUTH MODULE
  # Generates the data layer for the auth tables (users, organisations,
  # organisation_memberships) into package `auth` at db/auth — kept separate
  # from the expenses package so domain types don't bleed across modules.
  #
  # Both schema files are loaded, in order, because auth_schema.sql depends on
  # objects defined in schema.sql: the set_updated_at() trigger function and the
  # expenses table it attaches foreign keys to. Loading schema.sql also pulls
  # the expenses tables into this block's catalog, so omit_unused_structs keeps
  # them out of the generated auth models — only the structs actually referenced
  # by auth.sql (User, Organisation, OrganisationMembership) are emitted.
  # ===========================================================================
  - engine: "postgresql"

    schema:
      - "db/schema/schema.sql"
      - "db/schema/auth_schema.sql"

    queries: "db/queries/auth.sql"

    gen:
      go:
        package: "auth"
        out: "db/auth"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        emit_pointers_for_null_types: false

        # Don't emit structs for tables that no query in this block references
        # (i.e. the expenses tables loaded only to satisfy auth_schema.sql's
        # dependencies). Keeps db/auth focused on the auth domain.
        omit_unused_structs: true

        # Same type overrides as the expenses block.
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "pg_catalog.numeric"
            go_type: "string"

  # ===========================================================================
  # CONTACTS MODULE
  # Generates the data layer for the contacts table into package `contacts` at
  # db/contacts — its own domain package, kept separate from expenses/auth.
  #
  # All THREE schema files are loaded, in dependency order, because
  # contacts_schema.sql references objects defined earlier: the set_updated_at()
  # trigger function (schema.sql) and the organisations / users tables its
  # foreign keys point at (auth_schema.sql). Loading the expenses + auth tables
  # also pulls them into this block's catalog, so omit_unused_structs keeps them
  # out of the generated contacts models — only the Contact struct (referenced by
  # contacts.sql) is emitted.
  # ===========================================================================
  - engine: "postgresql"

    schema:
      - "db/schema/schema.sql"
      - "db/schema/auth_schema.sql"
      - "db/schema/contacts_schema.sql"

    queries: "db/queries/contacts.sql"

    gen:
      go:
        package: "contacts"
        out: "db/contacts"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        emit_pointers_for_null_types: false

        # Keep the expenses/auth tables (loaded only to satisfy contacts_schema.sql's
        # dependencies) out of db/contacts — emit only what contacts.sql references.
        omit_unused_structs: true

        # Same type overrides as the other blocks.
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "pg_catalog.numeric"
            go_type: "string"
